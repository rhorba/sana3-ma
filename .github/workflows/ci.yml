name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: "25"
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Backend format check (Spotless)
        working-directory: backend
        run: ./mvnw -B spotless:check

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npx ng lint

  test:
    name: Test + Coverage Gate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Backend tests (JUnit + Testcontainers, JaCoCo)
        working-directory: backend
        run: ./mvnw -B test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend tests (Vitest, coverage)
        working-directory: frontend
        run: npx ng test --coverage --coverage-reporters json-summary --coverage-reporters text --watch=false

      - name: Enforce combined coverage gate (80%)
        run: bash scripts/check-coverage.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semgrep SAST
        run: |
          pip install semgrep
          semgrep --config auto backend/ frontend/src

      - name: Trivy SCA — backend (Maven)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: backend
          severity: CRITICAL,HIGH
          exit-code: "1"
          scanners: vuln

      - name: Trivy SCA — frontend (npm)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: frontend
          severity: CRITICAL,HIGH
          exit-code: "1"
          scanners: vuln
          skip-dirs: frontend/node_modules

      - name: Gitleaks secrets scan
        run: docker run --rm -v "${{ github.workspace }}:/repo" zricethezav/gitleaks:latest git /repo

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t sana3-ma-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t sana3-ma-frontend:${{ github.sha }} ./frontend

      - name: Trivy image scan — backend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: sana3-ma-backend:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"

      - name: Trivy image scan — frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: sana3-ma-frontend:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Staging deploy placeholder
        run: |
          echo "No staging environment is provisioned yet (see docs/devops-sana3-ma.md §1 — sprint 1 scope is local docker-compose only)."
          echo "This job exists so the pipeline shape matches the documented 5 stages; wire in a real deploy target when staging infra exists."
