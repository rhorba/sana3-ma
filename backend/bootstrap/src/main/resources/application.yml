spring:
  application:
    name: sana3-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sana3}
    username: ${DB_USER:sana3}
    password: ${DB_PASSWORD:sana3_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-32-bytes-minimum-secret}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL_MIN:15}
    refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  upload:
    dir: ${UPLOAD_DIR:uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
